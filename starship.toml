# =============================================================================
# Starship Configuration
# Theme: Tokyo Night
# =============================================================================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

# =============================================================================
# Directory
# =============================================================================
[directory]
style = "bold #7aa2f7"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = " "
style = "bold #bb9af7"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold #f7768e"
format = "[$all_status$ahead_behind]($style) "
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
modified = "!"
staged = "+"
deleted = "✘"

# =============================================================================
# Command duration (only shown if > 3s)
# =============================================================================
[cmd_duration]
min_time = 3_000
style = "bold #e0af68"
format = "[ $duration]($style) "

# =============================================================================
# Prompt character
# =============================================================================
[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol = "[❯](bold #f7768e)"

# =============================================================================
# Disabled modules
# =============================================================================
[package]
disabled = true

[python]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true
